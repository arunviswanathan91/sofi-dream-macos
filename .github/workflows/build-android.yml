name: Build Android APK
on:
  push:
    branches:
      - main
      - claude/sofi-dream-android-app-4so2E
  workflow_dispatch:
jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      
      - name: Install dependencies
        run: npm install
      
      - name: Download fonts
        run: bash scripts/download-fonts.sh
      
      - name: Create .env.local
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          cat > .env.local << ENVEOF
          EXPO_PUBLIC_FIREBASE_API_KEY=$FIREBASE_API_KEY
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=$FIREBASE_AUTH_DOMAIN
          EXPO_PUBLIC_FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=$FIREBASE_STORAGE_BUCKET
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$FIREBASE_MESSAGING_SENDER_ID
          EXPO_PUBLIC_FIREBASE_APP_ID=$FIREBASE_APP_ID
          ENVEOF
      
      - name: Decode and create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "Creating google-services.json from GitHub secret..."
          echo "$GOOGLE_SERVICES_JSON" | base64 -d > google-services.json
          echo "✓ google-services.json created"
          # Verify the file exists and is valid JSON
          if jq empty google-services.json 2>/dev/null; then
            echo "✓ google-services.json is valid JSON"
            echo "✓ Package name: $(jq -r '.client[0].client_info.android_client_info.package_name' google-services.json)"
          else
            echo "✗ google-services.json is invalid or corrupted"
            exit 1
          fi
      
      - name: Build Android APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile preview --non-interactive
